services:
  - type: web
    name: neurosight-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: neurosight-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "43200"
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: PYTHONUNBUFFERED
        value: "1"
      # After deploying mobile to Vercel, update this with your real Vercel URL
      # e.g. https://neurosight-mobile.vercel.app,http://localhost:5173,...
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175

databases:
  - name: neurosight-db
    databaseName: brain_tumor
    plan: free
